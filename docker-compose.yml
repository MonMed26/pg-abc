services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: bca-merchant-qris-gateway:latest
    container_name: bca-qris-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override path agar pakai volume container
      SESSION_FILE: /app/data/session.json
      DB_PATH: /app/data/payments.db
      PORT: 3000
      HEADLESS: "true"
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      # Bind mount folder data lokal → container. Persist session + DB.
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Alokasi memori & CPU konservatif (Chromium cukup berat).
    # Tune sesuai kebutuhan produksi.
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
